site_name: AI Agent Framework Analysis
site_url: https://XavierZhang2002.github.io/ai-agent-framework-analysis
site_description: Deep code audit of 12 open-source agent frameworks — capability differentiation, MCP support, and engineering feature comparison.
site_author: Xavier

repo_name: XavierZhang2002/ai-agent-framework-analysis
repo_url: https://github.com/XavierZhang2002/ai-agent-framework-analysis
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Blog:
    - English: BLOG.en.md
    - 中文: BLOG.zh.md
  - Comparison: COMPARISON.md
  - Deep Dive:
    - Aider: deep-dive/Aider-DEEP-DIVE.md
    - Claude Agent SDK: deep-dive/Claude-Agent-SDK-Python-DEEP-DIVE.md
    - Codex CLI: deep-dive/Codex-CLI-DEEP-DIVE.md
    - Gemini CLI: deep-dive/Gemini-CLI-DEEP-DIVE.md
    - Goose: deep-dive/Goose-DEEP-DIVE.md
    - Kimi CLI: deep-dive/Kimi-CLI-DEEP-DIVE.md
    - OpenAI Agents SDK: deep-dive/OpenAI-Agents-SDK-DEEP-DIVE.md
    - OpenCode: deep-dive/OpenCode-DEEP-DIVE.md
    - OpenHands: deep-dive/OpenHands-DEEP-DIVE.md
    - OpenManus: deep-dive/OpenManus-DEEP-DIVE.md
    - Qwen Code: deep-dive/Qwen-Code-DEEP-DIVE.md
    - SWE-agent: deep-dive/SWE-agent-DEEP-DIVE.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/XavierZhang2002/ai-agent-framework-analysis
